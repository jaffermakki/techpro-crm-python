<head>

:root{
  --bg:#fafaf8;--surface:#ffffff;--surface2:#f4f6f4;--surface3:#eef1ee;
  --border:#e6e8e3;--border2:#d7dbd2;
  --accent:#0f8b5f;--accent2:#0a6e49;--accent-glow:rgba(15,139,95,.10);
  --green:#0f8b5f;--green-bg:rgba(15,139,95,.10);
  --amber:#b8860b;--amber-bg:rgba(184,134,11,.10);
  --red:#c0392b;--red-bg:rgba(192,57,43,.09);
  --purple:#6b5b95;--purple-bg:rgba(107,91,149,.09);
  --gold:#b8964a;--gold-bg:rgba(184,150,74,.12);
  --text:#1a1d1a;--text2:#6b716a;--text3:#a3a89e;
  --radius:9px;--radius-lg:14px;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#c2c7bd}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:222px;flex-shrink:0;background:#0d1410;border-right:1px solid #1a2620;display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid #1a2620}
.sidebar-logo h1{font-size:15px;font-weight:700;color:#f5f5f0;letter-spacing:-.3px}
.sidebar-logo p{font-size:10.5px;color:var(--gold);margin-top:2px;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.sidebar-logo .logo-icon{width:34px;height:34px;background:#000;border:1px solid #2a3a30;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;margin-bottom:12px;color:var(--gold);position:relative}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#8a9690;font-size:13px;font-weight:500;transition:background .12s,color .12s;margin-bottom:1px;border:1px solid transparent;position:relative}
.nav-item:hover{background:rgba(255,255,255,.04);color:#f5f5f0}
.nav-item.active{background:rgba(15,139,95,.16);color:#f5f5f0;border-color:rgba(15,139,95,.3)}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--gold);color:#0d1410;border-radius:999px;font-size:10px;padding:1px 6px;font-weight:700;font-family:var(--mono)}
.sidebar-bottom{padding:12px 8px;border-top:1px solid #1a2620}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.03)}
.user-avatar{width:28px;height:28px;border-radius:7px;background:#000;border:1px solid #2a3a30;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--gold);flex-shrink:0}
.user-info p{font-size:12px;font-weight:600;color:#f5f5f0}
.user-info span{font-size:10px;color:#5f6b62;font-family:var(--mono);letter-spacing:.4px}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{padding:16px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.topbar h2{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.topbar p{font-size:12px;color:var(--text2);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 26px;min-height:0;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;will-change:scroll-position}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:filter .12s,background .12s;text-decoration:none;font-family:var(--font);white-space:nowrap}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(232,51,42,.3)}
.btn-danger:hover{background:rgba(232,51,42,.2)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(62,207,110,.3)}
.btn-green:hover{background:rgba(62,207,110,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.03);contain:layout style}
.card-title{font-size:11.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:11px;background:var(--gold);border-radius:1px;display:inline-block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;transition:border-color .15s;contain:layout style}
.stat-card:hover{border-color:var(--border2)}
.stat-card::after{content:'';position:absolute;top:10px;right:10px;width:6px;height:6px;border-radius:50%;background:var(--border2)}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-value{font-size:27px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums;font-family:var(--mono);letter-spacing:-.5px;color:var(--accent)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);transition:border .12s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
input::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
th{padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
.badge{display:inline-block;padding:3px 10px 3px 9px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.2px;position:relative;transform:rotate(-1deg);box-shadow:0 1px 2px rgba(0,0,0,.08);font-family:var(--mono)}
.badge::before{content:'';position:absolute;left:-1px;top:50%;width:4px;height:4px;background:var(--surface);border-radius:50%;transform:translateY(-50%);box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.badge-blue{background:rgba(157,123,255,.15);color:var(--purple)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-gray{background:var(--surface3);color:var(--text2)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;border-left:3px solid transparent}
.alert-red{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.alert-green{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.alert-amber{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.pos-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;min-height:0;flex:1}
.pos-left{display:flex;flex-direction:column;gap:12px;min-height:0;overflow:hidden}
.pos-right{display:flex;flex-direction:column;gap:12px;overflow-y:auto;min-height:0}
.cart-wrap{flex:1;overflow:hidden;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);display:flex;flex-direction:column;min-height:200px}
.cart-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.cart-body{flex:1;overflow-y:auto}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);gap:8px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.cart-item-desc{flex:1;min-width:0}
.cart-item-desc p{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-desc span{font-size:11px;color:var(--text3);font-family:var(--mono)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:background .1s,border-color .1s}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-num{width:28px;text-align:center;font-weight:700;font-size:13px;font-family:var(--mono)}
.cart-total-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.total-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--text2)}
.total-row.grand{font-size:17px;font-weight:800;color:var(--text);padding-top:10px;margin-top:6px;border-top:2px solid var(--gold);font-family:var(--mono)}
.scan-bar{display:flex;gap:8px;align-items:center}
.scan-bar input{font-family:var(--mono);font-size:13px;background:var(--surface2);border-color:var(--accent);letter-spacing:.5px}
.scan-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.text-right{text-align:right}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-amber{color:var(--amber)}
.text-accent{color:var(--accent)}
.text-muted{color:var(--text2)}
.font-mono{font-family:var(--mono)}
.font-bold{font-weight:700}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.mb-3{margin-bottom:12px}
.flex{display:flex}
.flex-1{flex:1}
.items-center{align-items:center}
.gap-2{gap:8px}
.gap-3{gap:12px}
.w-full{width:100%}
@media (max-width:768px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;z-index:500;transform:translateX(-100%);width:260px;box-shadow:4px 0 24px rgba(0,0,0,.35)}
  #sidebar.mobile-open{transform:translateX(0)}
  .topbar{padding:12px 14px;display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:8px}
  .topbar h2{font-size:15px}
  .topbar p{display:none}
  .page{padding:14px 12px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat-value{font-size:22px}
  .form-row,.form-row3{grid-template-columns:1fr}
  .pos-layout{grid-template-columns:1fr;grid-template-rows:auto auto;height:auto}
  .pos-right{order:-1}
  .table-wrap{overflow-x:auto}
  table{min-width:480px}
  th,td{padding:9px 10px;font-size:12px}
  .card{padding:14px}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{max-width:100%;width:100%;max-height:92vh;border-radius:16px 16px 0 0}
}
#mobile-menu-btn{display:none}
@media (max-width:768px){#mobile-menu-btn{display:flex}}
</style>

<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">

      <div class="nav-item" onclick="showPage('pos')" id="nav-pos">Point of Sale</div>
      <div class="nav-item" onclick="showPage('repairs')" id="nav-repairs">Repairs <span class="nav-badge" id="repair-badge">0</span></div>

      <div class="nav-item" onclick="showPage('customers')" id="nav-customers">Customers</div>
      <div class="nav-item" onclick="showPage('reports')" id="nav-reports">Reports</div>
      <div class="nav-item" onclick="showPage('cashup')" id="nav-cashup">Cash-Up</div>
      <div class="nav-item" onclick="showPage('settings')" id="nav-settings">Settings</div>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">A</div>

      <button onclick="logout()" style="margin-top:8px;width:100%;background:none;border:1px solid #2a3a30;border-radius:8px;padding:7px;color:#8a9690;cursor:pointer;font-size:12px;">Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div class="topbar">
      <div><h2 id="page-title">Dashboard</h2><p id="page-sub">Today's overview</p></div>
      <div id="topbar-actions"></div>

    <div class="page" id="page-content"></div>
  </div>
</div>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; display:flex; align-items:center; justify-content:center;">
  <div style="background:white; padding:40px; border-radius:14px; max-width:360px; width:100%;">
    <h2>Tech-Pro+ Login</h2>
    <input id="login-user" placeholder="Username" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd; border-radius:6px;">
    <input id="login-pass" type="password" placeholder="Password" style="width:100%; margin-bottom:20px; padding:10px; border:1px solid #ddd; border-radius:6px;">
    <button onclick="doLogin()" style="width:100%; background:#0f8b5f; color:white; border:none; padding:12px; border-radius:6px; font-weight:bold; font-size:16px; cursor:pointer;">Sign In</button>
    <p id="login-error" style="color:red; margin-top:10px; font-size:13px;"></p>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9998; align-items:center; justify-content:center; padding:20px;">
  <div style="background:white; max-width:600px; width:100%; border-radius:14px; overflow:hidden;">
    <div style="padding:16px 20px; border-bottom:1px solid #e6e8e3; display:flex; justify-content:space-between; align-items:center;">
      <h3 id="modal-title">Modal</h3>
      <button onclick="closeModal()" style="background:none; border:none; font-size:20px; cursor:pointer;">×</button>
    </div>
    <div id="modal-body" style="padding:20px;"></div>
    <div id="modal-footer" style="padding:12px 20px; border-top:1px solid #e6e8e3; display:flex; gap:10px; justify-content:flex-end;"></div>
  </div>
</div>

<script>
// ============================================================
//  API CLIENT
// ============================================================
const API = {
    base: window.location.origin + '/api/',
    headers: { 'Content-Type': 'application/json' },
    async get(endpoint) {
        const res = await fetch(this.base + endpoint, { credentials: 'include', headers: this.headers });
        if (!res.ok) { if (res.status === 401 || res.status === 403) showLogin(); throw new Error('Auth error'); }
        return res.json();
    },
    async post(endpoint, data) {
        const res = await fetch(this.base + endpoint, {
            method: 'POST', credentials: 'include', headers: this.headers,
            body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    },
    async put(endpoint, data) {
        const res = await fetch(this.base + endpoint, {
            method: 'PUT', credentials: 'include', headers: this.headers,
            body: JSON.stringify(data)
        });
        return res.json();
    },
    async del(endpoint) {
        await fetch(this.base + endpoint, { method: 'DELETE', credentials: 'include' });
    }
};

// ============================================================
//  AUTH
// ============================================================
async function doLogin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    try {
        const res = await fetch(API.base + 'login/', {
            method: 'POST', headers: API.headers,
            body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (res.ok) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('user-name').textContent = data.name;
            loadAll().then(() => showPage('dashboard'));
        } else {
            document.getElementById('login-error').textContent = data.error || 'Invalid credentials';
        }
    } catch(e) {
        document.getElementById('login-error').textContent = 'Network error';
    }
}

function showLogin() {
    document.getElementById('login-overlay').style.display = 'flex';
}
function logout() {
    showLogin();
}

// ============================================================
//  STATE
// ============================================================
let products = [], customers = [], invoices = [], repairs = [];
let cart = [];
let settings = {};
const today = () => new Date().toISOString().slice(0,10);
const fmt = v => `$${Number(v||0).toFixed(2)}`;
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-CA') : '—';
const uid = () => 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);

async function loadAll() {
    try {
        products = await API.get('products/');
        customers = await API.get('customers/');
        invoices = await API.get('invoices/');
        repairs = await API.get('repairs/');
        settings = await API.get('settings/');
        updateBadges();
    } catch(e) { console.warn('Load error', e); }
}

function updateBadges() {
    const openRepairs = repairs.filter(r => !['COMPLETED','COLLECTED'].includes(r.status)).length;
    const rb = document.getElementById('repair-badge');
    if(rb) { rb.textContent = openRepairs; rb.style.display = openRepairs ? '' : 'none'; }
    const lowStock = products.filter(p => p.stock <= p.threshold).length;
    const sb = document.getElementById('stock-badge');
    if(sb) { sb.textContent = lowStock; sb.style.display = lowStock ? '' : 'none'; }
}

// ============================================================
//  NAVIGATION
// ============================================================
let currentPage = 'dashboard';
function showPage(page) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const nav = document.getElementById('nav-'+page);
    if(nav) nav.classList.add('active');
    const titles = {
        dashboard: ['Dashboard', 'Overview'],
        pos: ['Point of Sale', 'Scan & sell'],
        repairs: ['Repairs', 'Track tickets'],
        inventory: ['Inventory', 'Manage stock'],
        customers: ['Customers', 'CRM'],
        reports: ['Reports', 'Analytics'],
        cashup: ['Cash-Up', 'End of day'],
        settings: ['Settings', 'Configure']
    };
    document.getElementById('page-title').textContent = titles[page]?.[0] || page;
    document.getElementById('page-sub').textContent = titles[page]?.[1] || '';
    const c = document.getElementById('page-content');
    c.scrollTop = 0;
    loadAll().then(() => {
        switch(page) {
            case 'dashboard': renderDashboard(c); break;
            case 'pos': renderPOS(c); break;
            case 'repairs': renderRepairs(c); break;
            case 'inventory': renderInventory(c); break;
            case 'customers': renderCustomers(c); break;
            case 'reports': renderReports(c); break;
            case 'cashup': renderCashUp(c); break;
            case 'settings': renderSettings(c); break;
        }
    });
}

// ============================================================
//  DASHBOARD
// ============================================================
function renderDashboard(c) {
    const todayStr = today();
    const todayInv = invoices.filter(i => i.date === todayStr);
    const totalToday = todayInv.reduce((s,i) => s + parseFloat(i.total), 0);
    const openRepairs = repairs.filter(r => !['COMPLETED','COLLECTED'].includes(r.status)).length;
    const lowStock = products.filter(p => p.stock <= p.threshold).length;
    c.innerHTML = `
    <div class="stats-grid">

      <div class="stat-card"><div class="stat-label">Customers</div><div class="stat-value">${customers.length}</div></div>
    </div>
    <div class="card mt-3"><div class="card-title">Recent Invoices</div>
      ${invoices.slice(-5).reverse().map(i => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span>${i.number}</span><span>${fmt(i.total)}</span></div>`).join('')}
    </div>
    <div class="alert alert-green mt-3">🔒 Secure Django backend – all data encrypted.</div>`;
}

// ============================================================
//  POS
// ============================================================
function renderPOS(c) {
    c.innerHTML = `
    <div class="pos-layout">
      <div class="pos-left">
        <div class="scan-bar">
          <input id="sku-input" placeholder="Scan SKU" onkeydown="if(event.key==='Enter')scanSku()"/>
          <button class="btn btn-primary" onclick="scanSku()">Add</button>
          <button class="btn btn-secondary" onclick="openProductPicker()">Browse</button>
        </div>
        <div class="cart-wrap">
          <div class="cart-header"><span>Cart</span><span id="cart-count">0 items</span></div>
          <div class="cart-body" id="cart-body"><div class="cart-empty">Empty</div></div>
        </div>
      </div>
      <div class="pos-right">
        <div class="card"><div class="card-title">Customer</div>
          <div style="display:flex;gap:8px;"><input id="cust-search" placeholder="Phone" /><button class="btn btn-secondary btn-sm" onclick="lookupCustomer()">Find</button></div>
          <div id="cust-result"></div>
        </div>
        <div class="cart-total-panel">
          <div class="total-row"><span>Subtotal</span><span id="pos-sub">${fmt(0)}</span></div>
          <div class="total-row"><span>Tax</span><span id="pos-tax">${fmt(0)}</span></div>
          <div class="total-row grand"><span>TOTAL</span><span id="pos-total">${fmt(0)}</span></div>
          <button class="btn btn-primary w-full" onclick="completeSale()">Complete Sale</button>
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="btn btn-secondary btn-sm flex-1" onclick="clearCart()">Clear</button>
          </div>
        </div>
      </div>
    </div>`;
    renderCart();
}

async function scanSku() {
    const sku = document.getElementById('sku-input').value.trim();
    if(!sku) return;
    const prod = products.find(p => p.sku === sku);
    if(!prod) { alert('Not found'); return; }
    addToCart(prod);
    document.getElementById('sku-input').value = '';
}

function addToCart(prod) {
    const existing = cart.find(c => c.productId === prod.id);
    if(existing) existing.qty++;
    else cart.push({productId: prod.id, sku: prod.sku, name: prod.name, price: parseFloat(prod.price), qty: 1});
    renderCart();
}

function renderCart() {
    const body = document.getElementById('cart-body');
    const count = document.getElementById('cart-count');
    if(!body) return;
    if(cart.length === 0) {
        body.innerHTML = '<div class="cart-empty">Empty</div>';
        if(count) count.textContent = '0 items';
        return;
    }
    if(count) count.textContent = cart.reduce((s,i) => s + i.qty, 0) + ' items';
    body.innerHTML = cart.map((item, i) => `
      <div class="cart-item">
        <div class="cart-item-desc"><p>${item.name}</p><span>${item.sku}</span></div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <div style="min-width:80px;text-align:right;font-weight:700">${fmt(item.price*item.qty)}</div>
        <button onclick="cart.splice(${i},1);renderCart()" style="background:none;border:none;color:var(--text3);cursor:pointer;">✕</button>
      </div>`).join('');
    calcTotals();
}

function changeQty(i, delta) {
    const item = cart[i];
    if(!item) return;
    item.qty += delta;
    if(item.qty <= 0) cart.splice(i,1);
    renderCart();
}

function clearCart() { cart = []; renderCart(); }

function calcTotals() {
    const sub = cart.reduce((s,i) => s + i.price*i.qty, 0);
    const tax = sub * 0.13;
    const total = sub + tax;
    document.getElementById('pos-sub').textContent = fmt(sub);
    document.getElementById('pos-tax').textContent = fmt(tax);
    document.getElementById('pos-total').textContent = fmt(total);
}

function lookupCustomer() {
    const ph = document.getElementById('cust-search').value.trim();
    const found = customers.find(c => c.phone === ph);
    const res = document.getElementById('cust-result');
    if(found) res.innerHTML = `<div class="alert alert-green">${found.name} · ${found.phone}</div>`;
    else res.innerHTML = '<div class="alert alert-amber">Not found</div>';
}

async function completeSale() {
    if(cart.length === 0) { alert('Cart empty'); return; }
    try {
        const data = {
            cart: cart,
            discount: 0,
            customerName: 'Walk-in',
            customerPhone: '',
            province: 'ON',
            payment: 'Cash',
            tendered: cart.reduce((s,i) => s + i.price*i.qty, 0)
        };
        const result = await API.post('invoices/complete_sale/', data);
        alert('Sale complete! Invoice #' + result.number);
        cart = [];
        renderCart();
        await loadAll();
        showPage('dashboard');
    } catch(e) {
        alert('Sale failed: ' + e.message);
    }
}

function openProductPicker() {
    const html = `<div style="max-height:300px;overflow-y:auto;">${products.map(p => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span>${p.name}</span>
        <button class="btn btn-primary btn-sm" onclick="addToCart(products.find(x=>x.id==='${p.id}'));closeModal();renderCart();">Add</button>
      </div>`).join('')}</div>`;
    openModal('Products', html, '<button class="btn btn-secondary" onclick="closeModal()">Close</button>');
}

async function openAddProduct() {
    const html = `
    <div class="form-group"><label>SKU</label><input id="ap-sku"/></div>
    <div class="form-group"><label>Name</label><input id="ap-name"/></div>
    <div class="form-row">
      <div class="form-group"><label>Price</label><input id="ap-price" type="number" step="0.01"/></div>
      <div class="form-group"><label>Stock</label><input id="ap-stock" type="number" value="0"/></div>
    </div>`;
    openModal('Add Product', html, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewProduct()">Save</button>`);
}

async function saveNewProduct() {
    const sku = document.getElementById('ap-sku').value.trim();
    const name = document.getElementById('ap-name').value.trim();
    const price = parseFloat(document.getElementById('ap-price').value) || 0;
    const stock = parseInt(document.getElementById('ap-stock').value) || 0;
    if(!sku || !name) { alert('SKU and name required'); return; }
    try {
        await API.post('products/', { sku, name, price, stock, category:'ACCESSORY' });
        closeModal();
        await loadAll();
        renderInventory(document.getElementById('page-content'));
    } catch(e) { alert('Error: ' + e.message); }
}

async function editProduct(id) {
    const p = products.find(x => x.id === id);
    if(!p) return;
    const html = `
    <div class="form-group"><label>Name</label><input id="ep-name" value="${p.name}"/></div>
    <div class="form-row">
      <div class="form-group"><label>Price</label><input id="ep-price" type="number" step="0.01" value="${p.price}"/></div>
      <div class="form-group"><label>Stock</label><input id="ep-stock" type="number" value="${p.stock}"/></div>
    </div>`;
    openModal('Edit Product', html, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEditProduct('${id}')">Save</button>`);
}

async function saveEditProduct(id) {
    const name = document.getElementById('ep-name').value.trim();
    const price = parseFloat(document.getElementById('ep-price').value) || 0;
    const stock = parseInt(document.getElementById('ep-stock').value) || 0;
    try {
        await API.put(`products/${id}/`, { name, price, stock });
        closeModal();
        await loadAll();
        renderInventory(document.getElementById('page-content'));
    } catch(e) { alert('Error: ' + e.message); }
}

    const html = `

async function saveNewRepair() {
    const customer_name = document.getElementById('nr-name').value.trim();
    const phone = document.getElementById('nr-phone').value.trim();
    const device = document.getElementById('nr-device').value.trim();
    const issue = document.getElementById('nr-issue').value.trim();
    if(!customer_name || !phone || !device) { alert('All fields required'); return; }
    const ticket_no = repairs.length ? Math.max(...repairs.map(r=>r.ticket_no)) + 1 : 1001;
    try {
        await API.post('repairs/', { ticket_no, customer_name, phone, device, issue, status:'RECEIVED' });
        closeModal();
        await loadAll();
        renderRepairs(document.getElementById('page-content'));

// ============================================================
//  MODAL
// ============================================================
function openModal(title, html, footer) {
    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-footer').innerHTML = footer || '';
}
function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
}

// ============================================================
//  ON LOAD
// ============================================================
window.onload = function() {
    fetch(API.base + 'settings/', { credentials: 'include' })
        .then(res => {
            if (!res.ok) showLogin();
            else {
                loadAll().then(() => showPage('dashboard'));
            }
        })
        .catch(() => showLogin());
};
